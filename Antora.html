<html> 
    <head>
        <title> 
            Login Form
        </title>
    </head>
    <body>
      <h2>
        Login Form
      </h2>

      <form id="loginForm">
        Email: <input type="text" id="email"><br><br>
        Password: <input type="password" id="password"><br><br>

        <buttontype="submit">Login</button>


      </form>

      <p id="error" style="color:red;"></p>
      <p id="count"></p>

      <script>
        let worngcount=0;
        document.getElementByld("loginForm").addEventlistener("submit",function(e){
         e.preventDefault();

         let email=document.getElementByld("email").value;
         let password=document.getElementByld("password").value;
         let errorMsg="";

         if(!email.includes(@){
            errorMsg="Email must contain@";
         }
         else if(password.length < 6){
            errorMsg = "Password must be at least 6 characters";
         }
         else if(!password.includes("#")){
            errorMsg = "Password must contain #";
         }
         if(errorMsg !== ""){
           wrongCount++;

            document.getElementById("error").innerHTML = errorMsg;
             document.getElementById("count").innerHTML = 
            "Wrong submission count: " + wrongCount;
         }
        else{
            document.getElementById("error").innerHTML = "Login Successful";
            document.getElementById("count").innerHTML = "";
         }








        });
      </script>


      

    </body>
</html>
